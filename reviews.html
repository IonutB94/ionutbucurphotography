<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 120px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT 1000px */
.content {
    max-width: 500px;
    width: 100%;
    margin-top: 60px;
}

h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* INPUTURI FULL WIDTH */
input, textarea {
    width: 100%;
    padding: 18px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

/* TEXTAREA */
textarea {
    height: 140px;
    resize: none;
}

/* BUTON */
button {
    padding: 16px;
    background: #3bd16f;
    border: none;
    color: white;
    font-size: 17px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2bb85e;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 120px;
        align-items: flex-start;
    }

    .content {
        max-width: 100%;
        margin-top: 0;
    }

    h1 {
        font-size: 40px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

}

</style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<div class="hero">

    <div class="content">

        <h1>Reviews</h1>

        <form action="https://formspree.io/f/mlgawzqk" method="POST">
            <input type="text" name="name" placeholder="Your name" required>
            <textarea name="review" placeholder="Write your review..." required></textarea>
            <button type="submit">Send Review</button>
        </form>

    </div>

</div>

</body>
</html>
