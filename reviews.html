<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    min-height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-left: 120px;
    padding-top: 120px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT */
.content {
    max-width: 500px;
    width: 100%;
}

/* TITLU */
h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

input, textarea {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

textarea {
    height: 130px;
    resize: none;
}

/* STELE */
.stars {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 20px;
}

.stars span {
    font-size: 16px;
    margin-bottom: 5px;
}

.stars label {
    cursor: pointer;
    transition: 0.2s;
}

.stars label:hover {
    color: #ffd700;
}

.stars input {
    margin-right: 10px;
}

/* BUTON */
button {
    padding: 14px;
    background: #3bd16f;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2bb85e;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        padding-right: 20px;
    }

    .content {
        max-width: 100%;
    }

    h1 {
        font-size: 40px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

}

</style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<div class="hero">

<div class="content">

    <h1>Leave a Review</h1>

    <form action="https://formspree.io/f/mlgawzqk" method="POST">

        <input type="text" name="name" placeholder="Your name" required>

        <!-- STELE -->
        <div class="stars">
            <span>Rating:</span>

            <label><input type="radio" name="rating" value="5" required> ★★★★★</label>
            <label><input type="radio" name="rating" value="4"> ★★★★☆</label>
            <label><input type="radio" name="rating" value="3"> ★★★☆☆</label>
            <label><input type="radio" name="rating" value="2"> ★★☆☆☆</label>
            <label><input type="radio" name="rating" value="1"> ★☆☆☆☆</label>
        </div>

        <textarea name="review" placeholder="Write your review..." required></textarea>

        <button type="submit">Send Review</button>

    </form>

</div>

</div>

</body>
</html>
