<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

/* RESET */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT */
.content {
    max-width: 500px;
    width: 100%;
}

/* TITLU */
h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

input, textarea {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

textarea {
    height: 130px;
    resize: none;
}

/* ⭐ STELE INTERACTIVE */
.stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    font-size: 32px;
}

.stars input {
    display: none;
}

.stars label {
    color: #444;
    cursor: pointer;
    transition: 0.2s;
}

/* hover */
.stars label:hover,
.stars label:hover ~ label {
    color: #ffd700;
}

/* selectat */
.stars input:checked ~ label {
    color: #ffd700;
}

/* BUTON */
button {
    padding: 14px;
    background: #3bd16f;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2bb85e;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    html, body {
        overflow: auto;
    }

    .hero {
        padding-left: 20px;
        padding-right: 20px;
        align-items: flex-start;
        padding-top: 100px;
    }

    .content {
        max-width: 100%;
    }

    h1 {
        font-size: 40px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

}

</style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<div class="hero">

<div class="content">

    <h1>Leave a Review</h1>

    <form action="https://formspree.io/f/mlgawzqk" method="POST">

        <input type="text" name="name" placeholder="Your name" required>

        <!-- ⭐ STELE -->
        <div class="stars">
            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5">★</label>

            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4">★</label>

            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3">★</label>

            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2">★</label>

            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1">★</label>
        </div>

        <textarea name="review" placeholder="Write your review..." required></textarea>

        <button type="submit">Send Review</button>

    </form>

</div>

</div>

</body>
</html>
