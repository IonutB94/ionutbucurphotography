<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Drone Footage</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

/* 🔥 FUNDAL FIX */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    z-index: -1;
}

/* BODY */
body {
    margin: 0;
    color: white;
    overflow-x: hidden;
    overflow-y: scroll;
}

/* NAV */
.nav {
    position: fixed;
    top: 30px;
    right: 80px;
    z-index: 1000;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    margin: 120px 0 40px 120px;
}

/* VIDEO CONTAINER */
.video-container {
    display: flex;
    justify-content: center;
    margin-top: 80px;
}

/* VIDEO CARD */
.video-card {
    position: relative;
    width: 600px;
    height: 350px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.video-card:hover {
    transform: scale(1.03);
}

/* IMAGINE */
.video-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* OVERLAY */
.video-card::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    top: 0;
    left: 0;
}

/* PLAY BUTTON */
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    font-size: 80px;
    color: white;
    z-index: 2;
}

/* TEXT */
.video-text {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Oswald', sans-serif;
    letter-spacing: 2px;
    font-size: 16px;
    z-index: 2;
}

/* MOBILE */
@media (max-width: 768px) {

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    .title {
        font-size: 40px;
        margin: 100px 20px 30px 20px;
    }

    .video-card {
        width: 90%;
        height: 220px;
    }

}

</style>
</head>

<body>

<!-- FUNDAL -->
<div class="bg"></div>

<!-- NAV -->
<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<!-- TITLU -->
<div class="title">Drone Footage</div>

<!-- VIDEO -->
<div class="video-container">

    <div class="video-card" onclick="window.open('https://youtube.com/YOUR_LINK_HERE', '_blank')">
        <img src="drone-preview.jpg">
        <div class="play-btn">▶</div>
        <div class="video-text">WATCH DRONE FOOTAGE</div>
    </div>

</div>

</body>
</html>
