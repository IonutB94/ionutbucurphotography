<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Landscape Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: 'Playfair Display', serif;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-size: 18px;
}

/* TITLU */
.title {
    text-align: center;
    margin-top: 100px;
    font-size: 50px;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    padding: 50px;
}

.gallery img {
    width: 100%;
    margin-bottom: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.03);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
}

.lightbox img {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80%;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    cursor: pointer;
}

/* ARROWS */
.prev, .next {
    position: absolute;
    top: 50%;
    font-size: 40px;
    cursor: pointer;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

/* 📱 MOBILE */
@media (max-width: 768px) {

    .gallery {
        column-count: 1;
        padding: 20px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    .title {
        font-size: 35px;
    }

}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<div class="title">Landscape Photography</div>

<!-- GALERIE -->
<div class="gallery">

<img src="images/landscape/land1.jpg" onclick="openLightbox(0)">
<img src="images/landscape/land2.jpg" onclick="openLightbox(1)">
<img src="images/landscape/land3.jpg" onclick="openLightbox(2)">
<img src="images/landscape/land4.jpg" onclick="openLightbox(3)">
<img src="images/landscape/land5.jpg" onclick="openLightbox(4)">
<img src="images/landscape/land6.jpg" onclick="openLightbox(5)">
<img src="images/landscape/land7.jpg" onclick="openLightbox(6)">
<img src="images/landscape/land8.jpg" onclick="openLightbox(7)">
<img src="images/landscape/land9.jpg" onclick="openLightbox(8)">
<img src="images/landscape/land10.jpg" onclick="openLightbox(9)">
<img src="images/landscape/land11.jpg" onclick="openLightbox(10)">

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="next" onclick="changeSlide(1)">&#10095;</span>
</div>

<script>

let images = [
"images/landscape/land1.jpg",
"images/landscape/land2.jpg",
"images/landscape/land3.jpg",
"images/landscape/land4.jpg",
"images/landscape/land5.jpg",
"images/landscape/land6.jpg",
"images/landscape/land7.jpg",
"images/landscape/land8.jpg",
"images/landscape/land9.jpg",
"images/landscape/land10.jpg",
"images/landscape/land11.jpg"
];

let current = 0;

function openLightbox(index) {
    current = index;
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeSlide(n) {
    current += n;

    if (current < 0) current = images.length - 1;
    if (current >= images.length) current = 0;

    document.getElementById("lightbox-img").src = images[current];
}

</script>

</body>
</html>
