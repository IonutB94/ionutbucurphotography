<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Landscape Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

/* BODY IDENTIC CU INDEX */
body {
    margin: 0;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    color: white;
    overflow-x: hidden;
}

/* HERO STRUCTURA IDENTICA */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    padding-left: 120px;
    padding-top: 100px;
}

/* NAV FIX */
.nav {
    position: fixed;
    top: 30px;
    right: 80px;
    z-index: 1000;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT */
.content {
    width: 100%;
}

/* TITLU */
.title {
    font-size: 50px;
    margin-bottom: 40px;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    padding-right: 80px;
}

.gallery img {
    width: 100%;
    margin-bottom: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.03);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
}

.lightbox img {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80%;
    margin-top: 60px;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    cursor: pointer;
}

.prev, .next {
    position: absolute;
    top: 50%;
    font-size: 40px;
    cursor: pointer;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

/* MOBILE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        padding-right: 20px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    .gallery {
        column-count: 1;
        padding-right: 0;
    }

    .title {
        font-size: 35px;
    }

}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<!-- HERO STRUCTURA -->
<div class="hero">
<div class="content">

<div class="title">Landscape Photography</div>

<div class="gallery">

<img src="images/landscapes/land1.jpg" onclick="openLightbox(0)">
<img src="images/landscapes/land2.jpg" onclick="openLightbox(1)">
<img src="images/landscapes/land3.jpg" onclick="openLightbox(2)">
<img src="images/landscapes/land4.jpg" onclick="openLightbox(3)">
<img src="images/landscapes/land5.jpg" onclick="openLightbox(4)">
<img src="images/landscapes/land6.jpg" onclick="openLightbox(5)">
<img src="images/landscapes/land7.jpg" onclick="openLightbox(6)">
<img src="images/landscapes/land8.jpg" onclick="openLightbox(7)">
<img src="images/landscapes/land9.jpg" onclick="openLightbox(8)">
<img src="images/landscapes/land10.jpg" onclick="openLightbox(9)">
<img src="images/landscapes/land11.jpg" onclick="openLightbox(10)">

</div>

</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="next" onclick="changeSlide(1)">&#10095;</span>
</div>

<script>

let images = [
"images/landscapes/land1.jpg",
"images/landscapes/land2.jpg",
"images/landscapes/land3.jpg",
"images/landscapes/land4.jpg",
"images/landscapes/land5.jpg",
"images/landscapes/land6.jpg",
"images/landscapes/land7.jpg",
"images/landscapes/land8.jpg",
"images/landscapes/land9.jpg",
"images/landscapes/land10.jpg",
"images/landscapes/land11.jpg"
];

let current = 0;

function openLightbox(index) {
    current = index;
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeSlide(n) {
    current += n;

    if (current < 0) current = images.length - 1;
    if (current >= images.length) current = 0;

    document.getElementById("lightbox-img").src = images[current];
}

</script>

</body>
</html>
