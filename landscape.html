<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Landscape Photography</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

/* 🔥 FUNDAL FIX REAL */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    z-index: -1;
}

/* BODY CURAT */
body {
    margin: 0;
    color: white;
    overflow-x: hidden;
    overflow-y: scroll;
}

/* NAV IDENTIC */
.nav {
    position: fixed;
    top: 30px;
    right: 80px;
    z-index: 1000;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    margin: 120px 0 40px 120px;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    padding: 0 80px 50px 120px;
}

.gallery img {
    width: 100%;
    margin-bottom: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.03);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
}

.lightbox img {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80%;
    margin-top: 60px;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    cursor: pointer;
}

.prev, .next {
    position: absolute;
    top: 50%;
    font-size: 40px;
    cursor: pointer;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

/* MOBILE */
@media (max-width: 768px) {

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    .title {
        font-size: 40px;
        margin: 100px 20px 30px 20px;
    }

    .gallery {
        column-count: 1;
        padding: 0 20px 40px 20px;
    }

}

.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

.nav-links {
    display: flex;
}

@media (max-width: 768px) {

    .menu-toggle {
        display: block;
        color: white;
    }

    .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: rgba(0,0,0,0.9);
        width: 200px;
        flex-direction: column;
        text-align: right;
        padding: 20px;
        display: none;
    }

    .nav-links a {
        display: block;
        margin: 15px 0;
    }

}

</style>
</head>

<body>

<!-- 🔥 FUNDAL -->
<div class="bg"></div>

<!-- NAV -->
<div class="nav">

    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="reviews.html">Reviews</a>
    </div>

</div>

<!-- TITLU -->
<div class="title">Landscape Photography</div>

<!-- GALERIE -->
<div class="gallery">

<img src="images/landscapes/land1.jpg" onclick="openLightbox(0)">
<img src="images/landscapes/land2.jpg" onclick="openLightbox(1)">
<img src="images/landscapes/land3.jpg" onclick="openLightbox(2)">
<img src="images/landscapes/land4.jpg" onclick="openLightbox(3)">
<img src="images/landscapes/land5.jpg" onclick="openLightbox(4)">
<img src="images/landscapes/land6.jpg" onclick="openLightbox(5)">
<img src="images/landscapes/land7.jpg" onclick="openLightbox(6)">
<img src="images/landscapes/land8.jpg" onclick="openLightbox(7)">
<img src="images/landscapes/land9.jpg" onclick="openLightbox(8)">
<img src="images/landscapes/land10.jpg" onclick="openLightbox(9)">
<img src="images/landscapes/land11.jpg" onclick="openLightbox(10)">

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="next" onclick="changeSlide(1)">&#10095;</span>
</div>

<script>

let images = [
"images/landscapes/land1.jpg",
"images/landscapes/land2.jpg",
"images/landscapes/land3.jpg",
"images/landscapes/land4.jpg",
"images/landscapes/land5.jpg",
"images/landscapes/land6.jpg",
"images/landscapes/land7.jpg",
"images/landscapes/land8.jpg",
"images/landscapes/land9.jpg",
"images/landscapes/land10.jpg",
"images/landscapes/land11.jpg"
];

let current = 0;

function openLightbox(index) {
    current = index;
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeSlide(n) {
    current += n;

    if (current < 0) current = images.length - 1;
    if (current >= images.length) current = 0;

    document.getElementById("lightbox-img").src = images[current];
}

function toggleMenu() {
    var menu = document.getElementById("navLinks");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

</script>

</body>
</html>
