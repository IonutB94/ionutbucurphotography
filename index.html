<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ionut Bucur Photography</title>

<!-- FONTURI -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat center right;
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 80px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: #c58b6d;
}

.subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 80px;
    font-weight: bold;
}

/* LINE */
.line {
    width: 60px;
    height: 2px;
    background: #c58b6d;
    margin: 20px 0;
}

/* TEXT */
.tagline {
    letter-spacing: 3px;
    font-size: 14px;
    color: #ccc;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 25px;
    margin-top: 40px;
}

/* CARD */
.card {
    position: relative;
    width: 170px;
    height: 110px;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

/* OVERLAY */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    font-size: 12px;
    opacity: 0;
    transition: 0.4s;
}

/* HOVER */
.card:hover img {
    transform: scale(1.1);
}

.card:hover .overlay {
    opacity: 1;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="#">Home</a>
    <a href="#">Contact</a>
    <a href="#">Reviews</a>
</div>

<!-- HERO -->
<div class="hero">

    <div class="title">Ionut Bucur</div>
    <div class="subtitle">PHOTOGRAPHY</div>

    <div class="line"></div>

    <div class="tagline">CAPTURING MOMENTS THAT MATTER</div>

    <!-- CATEGORIES -->
    <div class="categories">

        <div class="card">
            <img src="peisaj.jpg">
            <div class="overlay">FOTOGRAFIE DE PEISAJ</div>
        </div>

        <div class="card">
            <img src="evenimente.jpg">
            <div class="overlay">EVENIMENTE</div>
        </div>

        <div class="card">
            <img src="drona.jpg">
            <div class="overlay">DRONĂ</div>
        </div>

    </div>

</div>

</body>
</html>
