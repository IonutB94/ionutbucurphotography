<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ionut Bucur Photography</title>

<!-- FONTURI -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* CONTAINER */
.content {
    max-width: 600px;
    margin-top: 60px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* TITLU WOW */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #c58b6d, #f5d0b5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(197,139,109,0.3);
}

/* PHOTOGRAPHY WOW */
.subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 90px;
    font-weight: 700;
    letter-spacing: 6px;
    line-height: 1;
    text-shadow: 0 0 25px rgba(255,255,255,0.15);
}

/* LINE */
.line {
    width: 60px;
    height: 2px;
    background: #c58b6d;
    margin: 20px 0;
}

/* TAGLINE WOW */
.tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 4px;
    font-size: 20px;
    color: #ddd;
    text-shadow: 0 0 10px rgba(255,255,255,0.1);
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 40px;
    margin-top: 50px;
}

/* CARD */
.card {
    position: relative;
    width: 350px;
    height: 250px;
    overflow: hidden;
    border-radius: 14px;
    cursor: pointer;
}

/* IMAGINE */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

/* OVERLAY JOS */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: 0.4s;
}

/* HOVER */
.card:hover img {
    transform: scale(1.05);
    filter: brightness(0.7);
}

.card:hover .overlay {
    opacity: 1;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        justify-content: center;
    }

    .content {
        margin-top: 0;
        max-width: 100%;
    }

    .title {
        font-size: 40px;
    }

    .subtitle {
        font-size: 50px;
        letter-spacing: 3px;
    }

    .tagline {
        font-size: 16px;
    }

    .categories {
        flex-direction: column;
        gap: 20px;
    }

    .card {
        width: 100%;
        height: 200px;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 14px;
        margin-left: 15px;
    }
}

</style>
</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">Contact</a>
    <a href="#">Reviews</a>
</div>

<div class="hero">
    <div class="content">

        <div class="title">Ionut Bucur</div>
        <div class="subtitle">PHOTOGRAPHY</div>

        <div class="line"></div>

        <div class="tagline">Where light meets emotion</div>

        <div class="categories">

            <div class="card">
                <img src="peisaj.jpg">
                <div class="overlay">Landscape Photography</div>
            </div>

            <div class="card">
                <img src="evenimente.jpg">
                <div class="overlay">Events Photography</div>
            </div>

            <div class="card">
                <img src="drona.jpg">
                <div class="overlay">Drone Footage</div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
