<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ionut Bucur Photography</title>

<!-- FONTURI -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* CONTAINER */
.content {
    max-width: 600px;
    margin-top: 60px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #c58b6d, #f5d0b5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SUBTITLU */
.subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 90px;
    font-weight: 700;
    letter-spacing: 6px;
    line-height: 1;
}

/* LINE */
.line {
    width: 60px;
    height: 2px;
    background: #c58b6d;
    margin: 20px 0;
}

/* TAGLINE */
.tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 4px;
    font-size: 20px;
    color: #ddd;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 35px;
    margin-top: 50px;
}

/* CARD */
.card {
    position: relative;
    width: 260px;
    height: 170px;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
}

/* IMAGINE */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

/* OVERLAY PERFECT CENTER */
.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 100%;
    height: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(0,0,0,0.65);

    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.2;

    opacity: 0;
    transition: 0.4s;
}

/* HOVER */
.card:hover img {
    transform: scale(1.05);
    filter: brightness(0.6);
}

.card:hover .overlay {
    opacity: 1;
}

</style>
</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">Contact</a>
    <a href="#">Reviews</a>
</div>

<div class="hero">
    <div class="content">

        <div class="title">Ionut Bucur</div>
        <div class="subtitle">PHOTOGRAPHY</div>

        <div class="line"></div>

        <div class="tagline">Where light meets emotion</div>

        <div class="categories">

            <div class="card">
                <img src="peisaj.jpg">
                <div class="overlay">
                    Landscape<br>Photography
                </div>
            </div>

            <div class="card">
                <img src="evenimente.jpg">
                <div class="overlay">
                    Events<br>Photography
                </div>
            </div>

            <div class="card">
                <img src="drona.jpg">
                <div class="overlay">
                    Drone<br>Footage
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
