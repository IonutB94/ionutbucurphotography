<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ionut Bucur Photography</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

html {
    scrollbar-gutter: stable;
}

body {
    overflow-y: scroll;
}

body {
    margin: 0;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT */
.content {
    max-width: 600px;
    margin-top: 60px;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #c58b6d, #f5d0b5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 90px;
    letter-spacing: 6px;
}

/* LINE */
.line {
    width: 60px;
    height: 2px;
    background: #c58b6d;
    margin: 20px 0;
}

/* TAGLINE */
.tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 4px;
    font-size: 20px;
    color: #ddd;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 35px;
    margin-top: 50px;
}

/* CARD */
.card {
    position: relative;
    width: 350px;
    height: 250px;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    opacity: 0;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.1);
}

.card:hover .overlay {
    opacity: 1;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 100px;
        align-items: flex-start;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    .categories {
        flex-direction: column;
    }

    .card {
        width: 100%;
        max-width: 320px;
        height: 200px;
    }

    .title {
        font-size: 40px;
    }

    .subtitle {
        font-size: 50px;
    }

}

</style>
</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="contact.html">Contact</a>
    <a href="reviews.html">Reviews</a>
</div>

<div class="hero">

<div class="content">

<div class="title">Ionut Bucur</div>
<div class="subtitle">PHOTOGRAPHY</div>

<div class="line"></div>

<div class="tagline">Where light meets emotion</div>

<div class="categories">

<!-- LANDSCAPE -->
<div class="card" onclick="location.href='landscape.html'">
    <img src="peisaj.jpg">
    <div class="overlay">Landscape Photography</div>
</div>

<!-- EVENTS -->
<div class="card" onclick="location.href='events.html'">
    <img src="evenimente.jpg">
    <div class="overlay">Events Photography</div>
</div>

<!-- DRONE -->
<div class="card" onclick="location.href='drone.html'">
    <img src="drona.jpg">
    <div class="overlay">Drone Footage</div>
</div>

</div>

</div>

</div>

</body>
</html>
