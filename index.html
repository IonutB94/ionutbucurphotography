<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ionut Bucur Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    scroll-behavior: smooth;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* CONTAINER */
.content {
    max-width: 600px;
    margin-top: 60px;
}

/* NAV */
.nav {
    position: absolute;
    top: 30px;
    right: 80px;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    transition: 0.3s;
}

.nav a:hover {
    color: #c58b6d;
}

/* TITLU */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    background: linear-gradient(90deg, #c58b6d, #f5d0b5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SUBTITLU */
.subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 90px;
    letter-spacing: 6px;
}

/* LINE */
.line {
    width: 60px;
    height: 2px;
    background: #c58b6d;
    margin: 20px 0;
}

/* TAGLINE */
.tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 4px;
    font-size: 20px;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 40px;
    margin-top: 50px;
}

.card {
    position: relative;
    width: 350px;
    height: 250px;
    overflow: hidden;
    border-radius: 14px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    text-transform: uppercase;
    opacity: 0;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.05);
    filter: brightness(0.7);
}

.card:hover .overlay {
    opacity: 1;
}

/* SECTIONS */
.section {
    padding: 80px 20px;
    text-align: center;
}

/* CONTACT */
.contact p {
    font-size: 18px;
    margin: 10px 0;
}

/* FORM */
form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea {
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 12px;
    background: #c58b6d;
    border: none;
    color: white;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {

    .hero {
        padding: 20px;
        height: auto;
    }

    .categories {
        flex-direction: column;
    }

    .card {
        width: 100%;
        height: 220px;
    }

    .nav {
        position: static;
        display: flex;
        justify-content: center;
        margin-top: 10px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="#">Home</a>
    <a href="#contact">Contact</a>
    <a href="#reviews">Reviews</a>
</div>

<!-- HERO -->
<div class="hero">
<div class="content">

<div class="title">Ionut Bucur</div>
<div class="subtitle">PHOTOGRAPHY</div>

<div class="line"></div>

<div class="tagline">Where light meets emotion</div>

<div class="categories">

<div class="card">
<img src="peisaj.jpg">
<div class="overlay">Landscape Photography</div>
</div>

<div class="card">
<img src="evenimente.jpg">
<div class="overlay">Events Photography</div>
</div>

<div class="card">
<img src="drona.jpg">
<div class="overlay">Drone Footage</div>
</div>

</div>
</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section contact">
<h2>Contact</h2>

<p>📞 Telefon: 0753 027 418</p>
<p>💬 WhatsApp: 0753 027 418</p>
<p>📧 Email: ionut.cristianbucurr@gmail.com</p>

</div>

<!-- REVIEWS -->
<div id="reviews" class="section">
<h2>Leave a Review</h2>

<form action="https://formspree.io/f/mlgawzqk" method="POST">

<input type="text" name="name" placeholder="Your name" required>

<textarea name="review" placeholder="Write your review..." required></textarea>

<button type="submit">Send Review</button>

</form>

</div>

</body>
</html>
