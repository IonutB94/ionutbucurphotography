<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<!-- 🔥 FONTURI IDENTICE -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>

html {
    scrollbar-gutter: stable;
}

body {
    overflow-y: scroll;
}

/* FUNDAL */
body {
    margin: 0;
    background: url("fundal.jpg") no-repeat right center;
    background-size: cover;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 120px;
}

/* 🔥 NAV IDENTIC CU INDEX */
.nav {
    position: fixed !important;
    top: 30px;
    right: 80px;
    z-index: 9999;
}

.nav a {
    margin-left: 30px;
    color: white;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
}

/* CONTENT */
.content {
    max-width: 600px;
}

h1 {
    font-size: 60px;
}

p {
    font-size: 20px;
    margin: 10px 0;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .hero {
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 100px;
        align-items: flex-start;
    }

    .nav {
        right: 20px;
        top: 20px;
    }

    .nav a {
        font-size: 16px;
        margin-left: 15px;
    }

    h1 {
        font-size: 40px;
    }

    p {
        font-size: 18px;
    }

}

/* HAMBURGER */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* NAV LINKS */
.nav-links {
    display: flex;
}

/* MOBILE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
        color: white;
    }

    .nav-links {
    position: absolute;
    top: 60px;
    right: 0;
    background: rgba(0,0,0,0.9);
    width: 200px;
    flex-direction: column;
    text-align: right;
    padding: 20px;
    display: none;
}

    .nav-links a {
        display: block;
        margin: 15px 0;
    }

}

</style>
</head>

<body>

<div class="nav">

    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="reviews.html">Reviews</a>
    </div>

</div>

<div class="hero">

<div class="content">
    <h1>Contact</h1>
    <p>📞 Telefon: 0753 027 418</p>
    <p>💬 WhatsApp: 0753 027 418</p>
    <p>📧 ionut.cristianbucurr@gmail.com</p>
</div>

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("navLinks");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>
</script>

</body>
</html>
